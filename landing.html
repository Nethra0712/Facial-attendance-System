<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - FaceAuth</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85vh; /* Change from height to min-height */
            text-align: center;
            padding: 40px 0; /* Add vertical padding */
            animation: fadeIn 0.8s ease-out; /* Add fade-in animation */
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hero-section h1 {
            font-size: 3rem; /* Scale down from 4rem */
            margin-bottom: 12px;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-section p {
            font-size: 1.25rem; /* Scale down from 1.5rem */
            color: var(--text-muted);
            margin-bottom: 50px;
        }
        .role-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* Better for responsiveness */
            gap: 24px;
            width: 100%;
            max-width: 720px;
        }
        .role-card {
            padding: 36px 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .role-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px -20px rgba(59, 130, 246, 0.4);
        }
        .role-card i {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .role-card h2 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .role-card p {
            font-size: 0.95rem;
            margin-bottom: 0;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-section">
            <h1><i class="ph-fill ph-scan"></i> FaceAuth</h1>
            <p>Next-Generation Attendance & Payroll Solution</p>
            
            <div class="role-cards">
                <a href="/login" class="glass role-card">
                    <i class="ph ph-shield-check"></i>
                    <h2>Admin Portal</h2>
                    <p>Manage employees, track attendance, and process payroll.</p>
                </a>
                <a href="/login" class="glass role-card">
                    <i class="ph ph-user"></i>
                    <h2>Employee Portal</h2>
                    <p>View your personal attendance logs and payment details.</p>
                </a>
            </div>
        </div>

        <footer>
            <p>© 2026 FaceAuth Enterprise. Secure. Modern. Efficient.</p>
        </footer>
    </div>
</body>
</html>
